description: 'FOCUS-aligned FinOps stub for Ferro Corporation. The legacy Ferro brand was merged into
  Vibrantz Technologies in 2022 and there is no public developer API or developer marketplace. Cost related
  to Ferro/Vibrantz materials is procurement spend on raw chemicals/materials, not API consumption. This
  artifact captures only the API-FinOps shape, which is effectively N/A.'
notes: No public API; FinOps is procurement-driven, not API-consumption-driven. Retained as a stub.
sources:
  - https://vibrantz.com/
principles:
  - name: Visibility
    description: Not applicable to API consumption; visibility lives in the procurement system that records
      raw-material POs from Vibrantz.
  - name: Allocation
    description: Allocation occurs at the BOM / cost-center level in the customer's ERP, not via API meters.
  - name: Optimization
    description: Optimization is a procurement function (volume contracts, supplier consolidation), not
      API engineering.
  - name: Accountability
    description: Procurement / supply chain owns supplier relationship; no API budget owner exists.
