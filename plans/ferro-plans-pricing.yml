description: Ferro Corporation, a former Fortune 1000 specialty materials/chemicals company, was acquired
  by Prince International Corporation and merged in 2022 to form Vibrantz Technologies (vibrantz.com).
  No public developer API or API marketplace exists for the legacy Ferro brand or for Vibrantz; the company
  operates in the B2B specialty chemicals space without a developer-facing offering. Any integration
  is via direct partner / EDI channels.
notes: No public API and no public pricing. Ferro merged into Vibrantz Technologies in 2022. The plans
  scaffold has been retained as a stub describing the lack of a public commercial API surface.
sources:
  - https://vibrantz.com/
